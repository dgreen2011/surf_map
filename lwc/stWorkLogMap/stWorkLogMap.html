<template>
    <div class="map-wrapper">
        <template if:true={hasError}>
            <div class="error-state slds-align_absolute-center">
                <div class="slds-text-align_center slds-p-around_large">
                    <lightning-icon
                        icon-name="utility:error"
                        size="medium"
                        alternative-text="Error"
                        class="error-icon"
                    ></lightning-icon>
                    <div class="slds-text-heading_medium slds-m-top_small">
                        {errorMessage}
                    </div>
                </div>
            </div>
        </template>

        <div
            data-id="map-canvas"
            class={mapContainerClass}
            lwc:dom="manual"
        ></div>
    </div>
</template>
